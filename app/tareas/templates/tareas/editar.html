{% extends "base.html" %}
{% block title %}Editar Tarea — {{ item.modulo.titulo }}{% endblock %}
{% block content %}
<div class="max-w-lg mx-auto">
    <a href="{{ url_for('curso.detalle', id=item.modulo.curso_id) }}" class="text-sm text-brand-400 hover:text-brand-300">&larr; Volver al curso</a>
    <h2 class="text-2xl font-extrabold text-white mt-2 mb-6">Editar Tarea</h2>

    <div class="bg-gray-800 rounded-xl border border-gray-700 p-6">
        <form method="POST" class="space-y-4">
            <div>
                <label class="block text-sm font-semibold text-gray-300 mb-1">Título de la tarea</label>
                <input type="text" name="titulo" required value="{{ item.titulo }}"
                       class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:ring-2 focus:ring-brand-500">
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-300 mb-1">Instrucciones</label>
                <textarea name="instrucciones" rows="4"
                          class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:ring-2 focus:ring-brand-500">{{ item.instrucciones or "" }}</textarea>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-300 mb-1">Trimestre</label>
                    <select name="trimestre"
                            class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:ring-2 focus:ring-brand-500">
                        <option value="1" {% if item.trimestre == 1 %}selected{% endif %}>1er Trimestre</option>
                        <option value="2" {% if item.trimestre == 2 %}selected{% endif %}>2do Trimestre</option>
                        <option value="3" {% if item.trimestre == 3 %}selected{% endif %}>3er Trimestre</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-300 mb-1">Fecha límite</label>
                    <input type="datetime-local" name="fecha_limite" required value="{{ (item.fecha_limite | bolivia).strftime('%Y-%m-%dT%H:%M') }}"
                           class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:ring-2 focus:ring-brand-500">
                </div>
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-300 mb-1">Puntaje máximo</label>
                <input type="number" name="puntaje_maximo" value="{{ item.puntaje_maximo }}" min="0.5" step="0.5"
                       class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:ring-2 focus:ring-brand-500">
            </div>
            <div class="flex gap-3 pt-2">
                <a href="{{ url_for('curso.detalle', id=item.modulo.curso_id) }}" class="flex-1 text-center bg-gray-700 hover:bg-gray-600 text-gray-200 font-semibold py-2.5 rounded-lg transition">Cancelar</a>
                <button type="submit" class="flex-1 bg-brand-500 hover:bg-brand-600 text-gray-900 font-bold py-2.5 rounded-lg transition shadow-lg shadow-brand-500/10">Guardar Cambios</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
