{% extends "base.html" %}
{% block title %}Unirse a un Curso {% endblock %}
{% block content %}
<div class="max-w-lg mx-auto">
    <h2 class="text-2xl font-extrabold text-white mb-6">Unirse a un Curso</h2>
    <div class="bg-gray-800 rounded-xl border border-gray-700 p-6">
        <p class="text-sm text-gray-500 mb-4">
            Ingresa el código de 6 dígitos que te proporcionó tu docente para inscribirte al curso.
        </p>
        <form method="POST" class="space-y-4">
            <div>
                <label class="block text-sm font-semibold text-gray-300 mb-1">Código del curso</label>
                <input type="text" name="codigo" required placeholder="000000" maxlength="6"
                       class="w-full text-center text-2xl tracking-[0.5em] font-bold bg-gray-900 border border-gray-700 rounded-lg px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-brand-500 placeholder:text-gray-600"
                       inputmode="numeric" pattern="[0-9]{6}">
            </div>
            <div class="flex gap-3 pt-2">
                <a href="{{ url_for('curso.listar') }}" class="flex-1 text-center bg-gray-700 hover:bg-gray-600 text-gray-200 font-semibold py-2.5 rounded-lg transition">Cancelar</a>
                <button type="submit" class="flex-1 bg-brand-500 hover:bg-brand-600 text-gray-900 font-bold py-2.5 rounded-lg transition shadow-lg shadow-brand-500/10">Inscribirme</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
