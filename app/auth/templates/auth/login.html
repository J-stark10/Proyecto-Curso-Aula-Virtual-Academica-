{% extends "base.html" %}
{% block title %}Iniciar Sesión - Aula Virtual Académica{% endblock %}
{% block content %}
<div class="max-w-md mx-auto mt-8">
    <div class="bg-gray-800 rounded-xl border border-gray-700 shadow-lg p-8">
        <h2 class="text-2xl font-extrabold text-white text-center mb-1">Iniciar Sesión</h2>
        <p class="text-sm text-gray-400 text-center mb-6">Accede a tu Aula Virtual Académica</p>

        <form method="POST" class="space-y-4">
            <div>
                <label class="block text-sm font-semibold text-gray-300 mb-1">Correo electrónico</label>
                <input type="email" name="email" required autofocus
                       class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:ring-2 focus:ring-brand-500"
                        placeholder="tucorreo@colegio.bo">
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-300 mb-1">Contraseña</label>
                <input type="password" name="password" required
                       class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:ring-2 focus:ring-brand-500"
                       placeholder="••••••••">
            </div>
            <button type="submit"
                    class="w-full bg-brand-500 hover:bg-brand-600 text-gray-900 font-bold py-2.5 rounded-lg transition duration-200 shadow-lg shadow-brand-500/10">
                Ingresar
            </button>
        </form>

        <p class="text-center text-sm text-gray-400 mt-6">
            ¿No tienes cuenta?
            <a href="{{ url_for('auth.register') }}" class="text-brand-400 hover:text-brand-300 font-semibold">Regístrate aquí</a>
        </p>
    </div>
</div>
{% endblock %}
