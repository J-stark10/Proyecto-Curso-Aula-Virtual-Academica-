{% extends "base.html" %}
{% block title %}Editar Módulo - {{ item.curso.nombre }}{% endblock %}
{% block content %}
<div class="max-w-lg mx-auto">
    <a href="{{ url_for('curso.detalle', id=item.curso_id) }}" class="text-sm text-brand-400 hover:text-brand-300">&larr; Volver al curso</a>
    <h2 class="text-2xl font-extrabold text-white mt-2 mb-6">Editar Módulo</h2>
    <div class="bg-gray-800 rounded-xl border border-gray-700 p-6">
        <form method="POST" class="space-y-4">
            <div>
                <label class="block text-sm font-semibold text-gray-300 mb-1">Título del módulo</label>
                <input type="text" name="titulo" required value="{{ item.titulo }}"
                       class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:ring-2 focus:ring-brand-500">
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-300 mb-1">Descripción</label>
                <textarea name="descripcion" rows="3"
                          class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:ring-2 focus:ring-brand-500">{{ item.descripcion or "" }}</textarea>
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-300 mb-1">Orden</label>
                <input type="number" name="orden" value="{{ item.orden }}" min="1"
                       class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:ring-2 focus:ring-brand-500">
            </div>
            <div class="flex gap-3 pt-2">
                <a href="{{ url_for('curso.detalle', id=item.curso_id) }}" class="flex-1 text-center bg-gray-700 hover:bg-gray-600 text-gray-200 font-semibold py-2.5 rounded-lg transition">Cancelar</a>
                <button type="submit" class="flex-1 bg-brand-500 hover:bg-brand-600 text-gray-900 font-bold py-2.5 rounded-lg transition shadow-lg shadow-brand-500/10">Guardar Cambios</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
